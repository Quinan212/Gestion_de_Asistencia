name: gestion_de_asistencias
description: "Sistema de gestion de asistencias estudiantiles"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  drift: ^2.28.2
  sqlite3_flutter_libs: ^0.5.39
  path: ^1.9.1
  path_provider: ^2.1.5
  file_selector: ^1.0.3
  shared_preferences: ^2.5.3
  shared_storage:
    path: third_party/shared_storage

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.9.0
  drift_dev: ^2.28.2

flutter:
  uses-material-design: true
