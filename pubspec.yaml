name: gestion_de_stock
description: "gestion_de_stock"
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: ^3.11.0

dependencies:

  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0
  path_provider: ^2.1.4
  share_plus: ^10.0.2
  archive: ^3.6.1
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  shared_storage: ^0.8.0
  restart_app: ^1.2.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.12
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/iconos/icon.png
    - assets/iconos/splash_logo.png
    - assets/imagenes/

flutter_launcher_icons:
  android: true
  ios: false
  min_sdk_android: 21
  image_path: assets/iconos/icon.png
  adaptive_icon_background: "#0B1220"


flutter_native_splash:
  android: true
  ios: false
  color: "#0B1220"
  image: assets/iconos/splash_logo.png

  android_12:
    color: "#0B1220"
    image: assets/iconos/splash_logo.png
    icon_background_color: "#0B1220"